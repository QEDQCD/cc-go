name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            ldflags: -H windowsgui -s -w
            cgo: "0"
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
            ldflags: -s -w
            cgo: "1"
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            ldflags: -s -w
            cgo: "1"
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            ldflags: -s -w
            cgo: "0"

    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: ${{ matrix.cgo }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "${{ matrix.ldflags }}" -o cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/cc-go/

      - uses: actions/upload-artifact@v4
        with:
          name: cc-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release assets
        run: |
          ls -lh dist/
          cd dist && sha256sum cc-go-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## 下载

            | 平台 | 文件 |
            |------|------|
            | Windows | `cc-go-windows-amd64.exe` |
            | macOS (Intel) | `cc-go-darwin-amd64` |
            | macOS (Apple Silicon) | `cc-go-darwin-arm64` |
            | Linux | `cc-go-linux-amd64` |

            下载后直接运行，首次启动会自动创建默认配置。
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
