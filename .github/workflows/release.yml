name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build Linux and Windows binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/cc-go-linux-amd64 ./cmd/cc-go/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-H windowsgui -s -w" -o dist/cc-go-windows-amd64.exe ./cmd/cc-go/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build macOS binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/cc-go-darwin-amd64 ./cmd/cc-go/
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/cc-go-darwin-arm64 ./cmd/cc-go/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/

  release:
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp artifacts/linux-windows/* dist/
          cp artifacts/macos/* dist/
          cd dist && sha256sum cc-go-* > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cc-go-linux-amd64
            dist/cc-go-windows-amd64.exe
            dist/cc-go-darwin-amd64
            dist/cc-go-darwin-arm64
            dist/SHA256SUMS
          generate_release_notes: true
